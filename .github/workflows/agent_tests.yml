name: Multi-Agent Enterprise Code Validation Audit

on:
  pull_request:
    branches: [ main, development ]
  push:
    branches: [ main ]

jobs:
  test-agent-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code snapshot
        uses: actions/checkout@v4

      - name: Configure Production Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Pip Dependency Allocations
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install Architecture Dependencies
        run: |
          python -m pip install --upgrade pip
